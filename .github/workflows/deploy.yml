name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -e
            cd "${{ secrets.VPS_APP_DIR }}"

            git checkout main
            git pull --ff-only origin main

            cd backend
            npm ci
            npm run build
            pm2 restart real-estate-backend || pm2 start dist/index.js --name real-estate-backend

            cd ../frontend
            npm ci
            npm run build
            pm2 restart real-estate-frontend || pm2 start npm --name real-estate-frontend -- start

            pm2 save
            pm2 status
